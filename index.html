        ];

        const statusConfig = {
            'Available': { text: 'Available', class: 'badge-available' },
            'Reserved': { text: 'Reserved', class: 'badge-reserved' },
            'Sold': { text: 'Sold', class: 'badge-sold' }
        };

        function displayProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if(items.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-12">No items found in this category.</p>`;
                return;
            }

            items.forEach(item => {
                const status = statusConfig[item.status] || { text: item.status, class: 'bg-gray-100 text-gray-800' };
                
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-xs border border-gray-100 overflow-hidden flex flex-col h-[460px]"; 
                
                if(item.status === 'Sold') card.classList.add('opacity-60');

                const storeLinkHTML = item.url 
                    ? `<a href="${item.url}" target="_blank" class="text-blue-600 hover:underline font-medium inline-flex items-center gap-0.5">
                        ${item.store} <span class="text-[10px]">🔗</span>
                       </a>` 
                    : item.store;

                const priceHTML = item.price === 0 
                    ? `<span class="text-xl font-extrabold text-green-600">FREE</span>`
                    : `<span class="text-xl font-extrabold text-gray-900">$${item.price}</span>`;

                card.innerHTML = `
                    <div class="relative bg-gray-50 h-52 p-3 flex items-center justify-center overflow-hidden border-b border-gray-100 shrink-0">
                        <img src="${item.photo}" alt="${item.name}" onerror="this.onerror=null; this.src='https://placehold.co/300x200?text=No+Image';" class="max-w-full max-h-full object-contain rounded-lg">
                        <span class="absolute top-3 right-3 px-2.5 py-1 text-xs font-semibold rounded-full shadow-xs ${status.class}">
                            ${status.text}
                        </span>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between overflow-hidden">
                        <div class="overflow-hidden">
                            <span class="text-xs font-bold text-blue-600 uppercase tracking-wide">${translateCategory(item.category)}</span>
                            <h3 class="text-base font-bold text-gray-900 mt-1 line-clamp-2">${item.name}</h3>
                            <p class="text-xs text-gray-400 mt-1">Condition: <span class="font-medium text-gray-600">${item.condition}</span> | Bought from: ${storeLinkHTML}</p>
                            <p class="text-sm text-gray-500 mt-2 line-clamp-3">${item.desc || 'No description available.'}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-100 flex items-baseline justify-between shrink-0">
                            <div>
                                ${priceHTML}
                                <span class="text-xs text-gray-400 line-through ml-1.5">Reg. $${item.original}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function translateCategory(cat) {
            if(cat === 'Furniture') return 'Furniture';
            if(cat === 'Electronics') return 'Electronics';
            if(cat === 'Home') return 'Home Supplies';
            return cat;
        }

        function filterCategory(category) {
            const buttons = document.querySelectorAll('#filter-buttons button');
            buttons.forEach(btn => {
                btn.className = "px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 cursor-pointer";
            });
            
            const evt = window.event;
            if(evt && evt.target && evt.target.tagName === 'BUTTON') {
                evt.target.className = "px-4 py-2 rounded-full text-sm font-medium bg-blue-600 text-white shadow-xs cursor-pointer";
            }

            if (category === 'All') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                displayProducts(filtered);
            }
        }

        function copyKakaoId(id) {
            navigator.clipboard.writeText(id).then(() => {
                alert("KakaoTalk ID has been copied! Please paste it into the Add Friends search bar in KakaoTalk. (ID: " + id + ")");
            }).catch(err => {
                alert("Failed to copy. KakaoTalk ID: " + id);
            });
        }

        displayProducts(products);
    </script>
